name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  # Job 1: Issue Triage - Auto-assign labels based on content
  issue-triage:
    runs-on: ubuntu-latest
    outputs:
      issue-number: ${{ steps.issue-data.outputs.issue-number }}
      issue-title: ${{ steps.issue-data.outputs.issue-title }}
      issue-body: ${{ steps.issue-data.outputs.issue-body }}
      issue-author: ${{ steps.issue-data.outputs.issue-author }}
      is-first-issue: ${{ steps.check-first-time.outputs.is-first-issue }}
    steps:
      - name: Get issue data
        id: issue-data
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            core.setOutput('issue-number', issue.number);
            core.setOutput('issue-title', issue.title.toLowerCase());
            core.setOutput('issue-body', (issue.body || '').toLowerCase());
            core.setOutput('issue-author', issue.user.login);

      - name: Check if first-time contributor
        id: check-first-time
        uses: actions/github-script@v7
        with:
          script: |
            const author = '${{ steps.issue-data.outputs.issue-author }}';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get all issues by this author in this repository
            const issues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              creator: author,
              state: 'all'
            });
            
            // Check if this is their first issue
            const isFirstIssue = issues.data.length <= 1; // <=1 because current issue is included
            core.setOutput('is-first-issue', isFirstIssue);

      - name: Add needs-triage label
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.issue-data.outputs.issue-number }};
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['needs-triage']
            });

      - name: Assign category labels based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ steps.issue-data.outputs.issue-title }}';
            const issueNumber = ${{ steps.issue-data.outputs.issue-number }};
            const labelsToAdd = [];
            
            if (title.includes('bug')) {
              labelsToAdd.push('bug');
            }
            if (title.includes('epic')) {
              labelsToAdd.push('epic');
            }
            if (title.includes('maintenance')) {
              labelsToAdd.push('maintenance');
            }
            
            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: labelsToAdd
              });
            }

      - name: Assign priority labels based on title and body
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ steps.issue-data.outputs.issue-title }}';
            const body = '${{ steps.issue-data.outputs.issue-body }}';
            const issueNumber = ${{ steps.issue-data.outputs.issue-number }};
            const combinedText = title + ' ' + body;
            
            let priorityLabel = 'priority-medium'; // default
            
            // Check for critical priority (highest priority)
            const criticalKeywords = ['critical', 'urgent', 'production', 'outage'];
            if (criticalKeywords.some(keyword => combinedText.includes(keyword))) {
              priorityLabel = 'priority-critical';
            } 
            // Check for high priority
            else {
              const highKeywords = ['important', 'high', 'blocking'];
              if (highKeywords.some(keyword => combinedText.includes(keyword))) {
                priorityLabel = 'priority-high';
              }
              // Check for low priority
              else {
                const lowKeywords = ['low', 'nice-to-have', 'minor'];
                if (lowKeywords.some(keyword => combinedText.includes(keyword))) {
                  priorityLabel = 'priority-low';
                }
              }
            }
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: [priorityLabel]
            });

  # Job 2: Task Breakdown - Create sub-issues for epic issues
  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(needs.issue-triage.outputs.issue-title, 'epic')
    steps:
      - name: Create sub-issues for epic
        id: create-subtasks
        uses: actions/github-script@v7
        with:
          script: |
            const parentTitle = '${{ needs.issue-triage.outputs.issue-title }}';
            const parentNumber = ${{ needs.issue-triage.outputs.issue-number }};
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Extract the actual title without "epic" prefix for cleaner subtask names
            const cleanTitle = parentTitle.replace(/^epic\s*[:\-]?\s*/, '').trim();
            
            const taskNames = [
              'Requirements Analysis',
              'Design and Architecture', 
              'Implementation',
              'Testing and Documentation'
            ];
            
            const subtaskNumbers = [];
            
            for (let i = 0; i < taskNames.length; i++) {
              const taskName = taskNames[i];
              const subtaskTitle = `[SUBTASK] ${cleanTitle} - Task ${i + 1}: ${taskName}`;
              const subtaskBody = `Related to #${parentNumber}\n\nThis is a subtask of the epic issue #${parentNumber}. Please refer to the parent issue for context and overall goals.`;
              
              try {
                const subtask = await github.rest.issues.create({
                  owner: owner,
                  repo: repo,
                  title: subtaskTitle,
                  body: subtaskBody,
                  labels: ['enhancement', 'needs-review']
                });
                
                subtaskNumbers.push(subtask.data.number);
                console.log(`Created subtask #${subtask.data.number}: ${subtaskTitle}`);
                
                // Small delay to avoid rate limiting
                await new Promise(resolve => setTimeout(resolve, 500));
                
              } catch (error) {
                console.error(`Error creating subtask ${i + 1}:`, error);
                throw error;
              }
            }
            
            // Store subtask numbers for parent update
            core.setOutput('subtask-numbers', subtaskNumbers.join(','));

      - name: Update parent issue with task checklist
        uses: actions/github-script@v7
        with:
          script: |
            const parentNumber = ${{ needs.issue-triage.outputs.issue-number }};
            const subtaskNumbers = '${{ steps.create-subtasks.outputs.subtask-numbers }}'.split(',').map(n => parseInt(n));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get current issue body
            const currentIssue = await github.rest.issues.get({
              owner: owner,
              repo: repo,
              issue_number: parentNumber
            });
            
            const currentBody = currentIssue.data.body || '';
            
            // Create task checklist
            let taskChecklist = '## Epic Tasks\n\n';
            subtaskNumbers.forEach((num, index) => {
              taskChecklist += `- [ ] Task ${index + 1}: #${num}\n`;
            });
            
            // Append to existing body or create new body
            const newBody = currentBody + '\n\n' + taskChecklist;
            
            await github.rest.issues.update({
              owner: owner,
              repo: repo,
              issue_number: parentNumber,
              body: newBody
            });

  # Job 3: Auto Response - Post comments and manage milestones
  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    steps:
      - name: Add first-time contributor label
        if: needs.issue-triage.outputs.is-first-issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.issue-triage.outputs.issue-number }};
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['first-time-contributor']
            });

      - name: Post welcome message for first-time contributors
        if: needs.issue-triage.outputs.is-first-issue == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.issue-triage.outputs.issue-number }};
            const author = '${{ needs.issue-triage.outputs.issue-author }}';
            
            const welcomeMessage = `Welcome @${author}! 👋\n\nThank you for opening your first issue in this repository. We appreciate your contribution and will review it as soon as possible.\n\nOur team will triage this issue and provide feedback. Please feel free to ask questions if you need any clarification.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: welcomeMessage
            });

      - name: Post type-specific response
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ needs.issue-triage.outputs.issue-title }}';
            const issueNumber = ${{ needs.issue-triage.outputs.issue-number }};
            let responseMessage = '';
            
            if (title.includes('bug')) {
              responseMessage = 'Thank you for reporting this issue. Our team will review it according to our **Bug Report Guidelines**. Please ensure you\'ve provided all the necessary information including reproduction steps, expected behavior, and environment details.';
            } else if (title.includes('epic')) {
              responseMessage = 'Thank you for this feature request! This will be processed according to our **Feature Request Process**. Our team will evaluate the proposal, assess its alignment with project goals, and provide feedback on the implementation timeline.';
            } else if (title.includes('maintenance')) {
              responseMessage = 'Thank you for this maintenance report. This will be handled according to our **Maintenance Guidelines**. Our team will assess the impact, risk, and priority of this maintenance task before scheduling it for implementation.';
            }
            
            if (responseMessage) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: responseMessage
              });
            }

      - name: Set milestone for high/critical priority issues
        uses: actions/github-script@v7
        with:
          script: |
            const title = '${{ needs.issue-triage.outputs.issue-title }}';
            const body = '${{ needs.issue-triage.outputs.issue-body }}';
            const issueNumber = ${{ needs.issue-triage.outputs.issue-number }};
            const combinedText = title + ' ' + body;
            
            // Check if this is a high or critical priority issue
            const highPriorityKeywords = ['critical', 'urgent', 'production', 'outage', 'important', 'high', 'blocking'];
            const isHighPriority = highPriorityKeywords.some(keyword => combinedText.includes(keyword));
            
            if (isHighPriority) {
              try {
                // Try to find the v1.0.0 milestone
                const milestones = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });
                
                const v1Milestone = milestones.data.find(m => m.title === 'v1.0.0');
                
                if (v1Milestone) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    milestone: v1Milestone.number
                  });
                  console.log(`Set milestone v1.0.0 for issue #${issueNumber}`);
                } else {
                  console.log('Milestone v1.0.0 not found, creating it...');
                  // Create the milestone if it doesn't exist
                  const newMilestone = await github.rest.issues.createMilestone({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: 'v1.0.0',
                    description: 'Version 1.0.0 Release'
                  });
                  
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber,
                    milestone: newMilestone.data.number
                  });
                  console.log(`Created and set milestone v1.0.0 for issue #${issueNumber}`);
                }
              } catch (error) {
                console.error('Error setting milestone:', error);
                // Don't fail the workflow if milestone setting fails
              }
            }

      - name: Update status from needs-triage to needs-review
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.issue-triage.outputs.issue-number }};
            
            try {
              // Remove needs-triage label
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'needs-triage'
              });
              
              // Add needs-review label
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: ['needs-review']
              });
              
              console.log(`Updated issue #${issueNumber} status from needs-triage to needs-review`);
            } catch (error) {
              console.error('Error updating status labels:', error);
              // Don't fail the workflow if label update fails
            }